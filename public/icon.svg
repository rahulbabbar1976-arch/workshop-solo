<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#111827" />
  
  <g transform="translate(256, 256)">
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="190" fill="none" stroke="#f97316" stroke-width="20" />
    
    <!-- Right B -->
    <text x="15" y="20" font-family="Arial, sans-serif" font-size="280" font-weight="900" fill="#f97316" text-anchor="start" dominant-baseline="middle">B</text>
    
    <!-- Left B (Mirrored) -->
    <g transform="scale(-1, 1)">
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="280" font-weight="900" fill="#f97316" text-anchor="start" dominant-baseline="middle">B</text>
    </g>
    
    <!-- Center Bottom Dot -->
    <circle cx="0" cy="150" r="28" fill="#f97316" />
  </g>
</svg>
