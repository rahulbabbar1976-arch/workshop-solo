<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoShop OS — Minimal SaaS Theme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --graphite:#14171A;
    --graphite-2:#1D2126;
    --paper:#F7F8FA;
    --card:#FFFFFF;
    --amber:#4F46E5;
    --amber-dark:#4338CA;
    --teal:#16A34A;
    --teal-bg:#EAF7EE;
    --red:#DC2626;
    --red-bg:#FDEAEA;
    --ink:#111827;
    --steel:#6B7280;
    --steel-light:#9CA3AF;
    --line:#E5E7EB;
    --disp:'Inter',sans-serif;
    --body:'Inter',sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:var(--body);
    background:#0B0D0F;
    color:var(--ink);
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:28px 12px 60px;
  }
  .toolbar{
    display:flex; align-items:center; gap:14px; margin-bottom:22px;
    background:var(--graphite-2); padding:10px 16px; border-radius:100px;
    border:1px solid #2A2F36;
  }
  .toolbar .brand{
    font-family:var(--disp); color:var(--paper); letter-spacing:.5px; font-size:13px; font-weight:600;
    padding-right:10px; border-right:1px solid #333; margin-right:2px;
  }
  .toolbar .brand span{color:var(--amber);}
  .devbtn{
    font-family:var(--body); font-weight:600; font-size:12.5px; letter-spacing:.3px;
    background:transparent; color:var(--steel-light); border:none; padding:8px 16px;
    border-radius:100px; cursor:pointer; transition:all .15s ease;
  }
  .devbtn.active{background:var(--amber); color:#FFFFFF;}
  .stage{width:100%; display:flex; justify-content:center;}

  /* ============ DEVICE FRAMES ============ */
  .frame{
    background:var(--graphite);
    border-radius:44px;
    box-shadow:0 30px 70px rgba(0,0,0,.55);
    padding:14px;
    position:relative;
  }
  .frame.mobile{width:390px; height:844px;}
  .frame.tablet{width:980px; height:735px; border-radius:28px; padding:12px;}
  .screen{
    background:var(--paper);
    width:100%; height:100%;
    border-radius:30px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .frame.tablet .screen{border-radius:18px; flex-direction:row;}
  .notch{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    width:110px; height:22px; background:var(--graphite); border-radius:14px; z-index:50;
  }
  .frame.tablet .notch{display:none;}
  .statusbar{
    height:34px; flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
    padding:0 26px; font-family:var(--mono); font-size:11px; font-weight:600; color:var(--ink);
    background:var(--paper);
  }
  .frame.tablet .statusbar{display:none;}

  /* ============ TOP APP BAR ============ */
  .appbar{
    padding:10px 18px 14px; background:var(--paper); flex-shrink:0;
    display:flex; align-items:center; gap:12px;
  }
  .appbar h1{font-family:var(--disp); font-size:20px; letter-spacing:.3px; font-weight:600; flex:1;}
  .iconbtn{
    width:34px; height:34px; border-radius:10px; border:1px solid var(--line); background:var(--card);
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink); flex-shrink:0;
  }
  .iconbtn:hover{border-color:var(--amber-dark);}
  .avatar{
    width:34px; height:34px; border-radius:10px; background:var(--graphite); color:var(--paper);
    font-family:var(--disp); font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }

  /* ============ SCROLLABLE CONTENT ============ */
  .content{flex:1; overflow-y:auto; padding:0 18px 100px;}
  .content::-webkit-scrollbar{width:0;}
  .frame.tablet .content{padding-bottom:24px;}

  /* ============ BOTTOM NAV (mobile) ============ */
  .bottomnav{
    position:absolute; bottom:0; left:0; right:0; height:78px;
    background:var(--card); border-top:1px solid var(--line);
    display:flex; align-items:flex-start; padding-top:10px; z-index:40;
  }
  .navitem{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--steel-light); cursor:pointer; font-size:10.5px; font-weight:600;
  }
  .navitem.active{color:var(--amber-dark);}
  .navitem svg{stroke:currentColor;}

  /* ============ TABLET RAIL ============ */
  .rail{
    width:78px; flex-shrink:0; background:var(--graphite); display:flex; flex-direction:column;
    align-items:center; padding:20px 0; gap:6px;
  }
  .rail .railbrand{width:34px; height:34px; border-radius:9px; background:var(--amber); margin-bottom:22px;
    display:flex; align-items:center; justify-content:center; font-family:var(--disp); font-weight:700; color:#FFFFFF; font-size:15px;}
  .railitem{
    width:54px; height:54px; border-radius:12px; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:3px; color:#7A828E; cursor:pointer; font-size:9px; font-weight:600;
  }
  .railitem.active{background:#262B32; color:var(--amber);}
  .railitem svg{stroke:currentColor;}

  .tabletmain{flex:1; display:flex; flex-direction:column; min-width:0;}
  .split{flex:1; display:flex; min-height:0;}
  .pane-list{width:340px; flex-shrink:0; border-right:1px solid var(--line); overflow-y:auto; padding:14px 0 14px 0;}
  .pane-detail{flex:1; overflow-y:auto; padding:0;}

  /* ============ FAB ============ */
  .fab{
    position:absolute; right:20px; bottom:96px; width:54px; height:54px; border-radius:16px;
    background:var(--amber); display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 10px 24px rgba(242,162,12,.45); z-index:41;
  }
  .frame.tablet .fab{display:none;}

  /* ============ CARDS / COMPONENTS ============ */
  .stats-row{display:flex; gap:10px; margin:14px 0 18px;}
  .stat{
    flex:1; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 10px;
  }
  .stat .num{font-family:var(--disp); font-size:24px; font-weight:600;}
  .stat .lbl{font-size:10.5px; color:var(--steel); font-weight:600; text-transform:uppercase; letter-spacing:.4px; margin-top:2px;}
  .stat.amber .num{color:var(--amber-dark);}
  .stat.teal .num{color:var(--teal);}
  .stat.red .num{color:var(--red);}

  .section-title{
    font-family:var(--disp); font-size:13px; text-transform:uppercase; letter-spacing:.8px;
    color:var(--steel); margin:18px 0 10px; font-weight:600;
  }

  .searchbar{
    display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:9px 12px; margin-top:4px;
  }
  .searchbar input{border:none; background:transparent; outline:none; font-family:var(--body); font-size:13px; flex:1; color:var(--ink);}
  .searchbar svg{stroke:var(--steel-light); flex-shrink:0;}

  .chiprow{display:flex; gap:8px; margin:12px 0 4px; overflow-x:auto; padding-bottom:2px;}
  .chip{
    flex-shrink:0; padding:7px 13px; border-radius:100px; background:var(--card); border:1px solid var(--line);
    font-size:12px; font-weight:600; color:var(--steel); cursor:pointer; white-space:nowrap;
  }
  .chip.active{background:var(--ink); color:var(--paper); border-color:var(--ink);}

  /* ticket-style job card */
  .ticket{
    background:var(--card); border-radius:14px; border:1px solid var(--line); margin-bottom:12px;
    position:relative; cursor:pointer; overflow:hidden;
  }
  .ticket:hover{border-color:var(--amber-dark);}
  .ticket-top{display:flex; align-items:flex-start; justify-content:space-between; padding:13px 14px 10px;}
  .ticket-id{font-family:var(--mono); font-size:11px; color:var(--steel); font-weight:600;}
  .ticket-plate{font-family:var(--mono); font-size:15px; font-weight:600; letter-spacing:.5px; margin-top:2px;}
  .ticket-veh{font-size:12.5px; color:var(--steel); margin-top:1px;}
  .stamp{
    font-family:var(--disp); font-size:10.5px; font-weight:600; text-transform:none; letter-spacing:0;
    padding:5px 11px; border-radius:100px; border:none; white-space:nowrap;
  }
  .stamp.in-progress{color:var(--amber-dark); border-color:var(--amber-dark); background:#ECEBFC;}
  .stamp.awaiting-parts{color:var(--red); border-color:var(--red); background:var(--red-bg);}
  .stamp.awaiting-approval{color:#7C5CBF; border-color:#7C5CBF; background:#EFEAFB;}
  .stamp.ready-pickup{color:var(--teal); border-color:var(--teal); background:var(--teal-bg);}
  .stamp.completed{color:var(--steel); border-color:var(--steel-light); background:#F0F0F0;}
  .ticket-perf{border-top:1px solid var(--line); margin:0 14px; display:flex; align-items:center; justify-content:space-between; padding:9px 0 12px;}
  .ticket-cust{font-size:12px; color:var(--ink); font-weight:600;}
  .ticket-meta{font-size:11px; color:var(--steel-light); font-family:var(--mono);}
  .punch{display:none;}
  .punch.r{display:none;}

  /* radial progress */
  .dial{position:relative; width:64px; height:64px; flex-shrink:0;}
  .dial svg{transform:rotate(-90deg);}
  .dial .pct{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:var(--disp); font-size:15px; font-weight:600;}

  /* job detail header */
  .jd-header{background:var(--graphite); color:var(--paper); padding:18px 18px 20px; flex-shrink:0;}
  .jd-back{display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--steel-light); font-weight:600; cursor:pointer; margin-bottom:12px;}
  .jd-toprow{display:flex; justify-content:space-between; align-items:flex-start;}
  .jd-plate{font-family:var(--mono); font-size:26px; font-weight:600; letter-spacing:1px;}
  .jd-veh{font-size:13px; color:#9CA3AF; margin-top:2px;}
  .jd-id{font-family:var(--mono); font-size:11px; color:var(--amber); margin-top:8px; font-weight:600;}
  .jd-customer{display:flex; align-items:center; gap:10px; margin-top:14px; background:#1F242B; padding:10px 12px; border-radius:12px;}
  .jd-customer .ci{width:36px; height:36px; border-radius:9px; background:var(--amber); color:#FFFFFF; font-family:var(--disp); font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .jd-customer .cn{font-size:13px; font-weight:600;}
  .jd-customer .cp{font-size:11px; color:#9CA3AF; font-family:var(--mono);}
  .callbtn{margin-left:auto; width:32px; height:32px; border-radius:9px; background:var(--teal); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;}

  .tabs{display:flex; gap:4px; background:var(--card); border-bottom:1px solid var(--line); padding:0 14px; overflow-x:auto; flex-shrink:0;}
  .tabbtn{padding:13px 12px; font-size:12.5px; font-weight:600; color:var(--steel); cursor:pointer; border-bottom:2.5px solid transparent; white-space:nowrap;}
  .tabbtn.active{color:var(--ink); border-color:var(--amber);}

  .field-row{display:flex; justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--line); font-size:13px;}
  .field-row .k{color:var(--steel);}
  .field-row .v{font-weight:600; text-align:right;}

  .lineitem{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 13px; margin-bottom:9px;}
  .li-top{display:flex; justify-content:space-between; font-size:13px; font-weight:600;}
  .li-sub{display:flex; justify-content:space-between; font-size:11.5px; color:var(--steel); margin-top:5px; font-family:var(--mono);}
  .li-total{font-family:var(--mono); font-weight:600;}

  .addbtn{
    display:flex; align-items:center; justify-content:center; gap:6px; width:100%; padding:11px;
    border:1.5px dashed var(--steel-light); border-radius:12px; color:var(--steel); font-size:12.5px; font-weight:600;
    cursor:pointer; margin-top:4px;
  }
  .addbtn:hover{border-color:var(--amber-dark); color:var(--amber-dark);}

  .totals-box{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-top:14px;}
  .totals-box .field-row:last-child{border-bottom:none;}
  .totals-box .grand{font-family:var(--disp); font-size:17px;}

  .primary-btn{
    width:100%; background:var(--ink); color:var(--paper); border:none; border-radius:12px; padding:13px;
    font-family:var(--body); font-weight:700; font-size:13.5px; cursor:pointer; margin-top:12px; letter-spacing:.2px;
  }
  .primary-btn.amber{background:var(--amber); color:#FFFFFF;}
  .primary-btn.outline{background:transparent; border:1.5px solid var(--ink); color:var(--ink);}
  .btnrow{display:flex; gap:10px; margin-top:12px;}
  .btnrow .primary-btn{margin-top:0;}

  .status-pill{display:inline-flex; align-items:center; gap:5px; padding:4px 11px; border-radius:100px; font-size:11px; font-weight:700;}
  .status-pill.paid{background:var(--teal-bg); color:var(--teal);}
  .status-pill.unpaid{background:#ECEBFC; color:var(--amber-dark);}
  .status-pill.overdue{background:var(--red-bg); color:var(--red);}
  .status-pill.sent{background:#EFEAFB; color:#7C5CBF;}
  .status-pill.approved{background:var(--teal-bg); color:var(--teal);}
  .status-pill.draft{background:#F0F0F0; color:var(--steel);}

  .customer-row{display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line); cursor:pointer;}
  .customer-row .ci{width:42px; height:42px; border-radius:11px; background:var(--graphite); color:var(--paper); font-family:var(--disp); font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .customer-row .cn{font-size:14px; font-weight:600;}
  .customer-row .cm{font-size:11.5px; color:var(--steel);}
  .chev{stroke:var(--steel-light); flex-shrink:0; margin-left:auto;}

  .vehicle-card{background:var(--card); border:1px solid var(--line); border-radius:13px; padding:13px; margin-bottom:10px; display:flex; align-items:center; gap:12px;}
  .vehicle-card .vp{font-family:var(--mono); font-weight:600; font-size:14px;}
  .vehicle-card .vm{font-size:11.5px; color:var(--steel); margin-top:1px;}
  .vicon{width:40px; height:40px; border-radius:10px; background:#F1F2F4; display:flex; align-items:center; justify-content:center; flex-shrink:0;}

  .timeline{position:relative; padding-left:18px; margin-top:6px;}
  .tl-item{position:relative; padding-bottom:16px;}
  .tl-item::before{content:''; position:absolute; left:-18px; top:4px; width:8px; height:8px; border-radius:50%; background:var(--amber);}
  .tl-item::after{content:''; position:absolute; left:-15px; top:12px; width:1px; bottom:-4px; background:var(--line);}
  .tl-item:last-child::after{display:none;}
  .tl-date{font-family:var(--mono); font-size:10.5px; color:var(--steel-light); font-weight:600;}
  .tl-text{font-size:12.5px; font-weight:600; margin-top:2px;}
  .tl-sub{font-size:11.5px; color:var(--steel); margin-top:1px;}

  .step-track{display:flex; align-items:center; gap:4px; margin-bottom:6px;}
  .step-dot{width:26px; height:26px; border-radius:50%; background:var(--card); border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:11px; font-weight:600; color:var(--steel-light); flex-shrink:0;}
  .step-dot.done{background:var(--teal); border-color:var(--teal); color:#fff;}
  .step-dot.now{background:var(--amber); border-color:var(--amber); color:#FFFFFF;}
  .step-line{flex:1; height:1.5px; background:var(--line);}
  .step-line.done{background:var(--teal);}

  .formgroup{margin-bottom:14px;}
  .formgroup label{font-size:11.5px; font-weight:700; color:var(--steel); text-transform:uppercase; letter-spacing:.4px; display:block; margin-bottom:6px;}
  .forminput{width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:10px; background:var(--card); font-family:var(--body); font-size:13.5px; color:var(--ink);}
  .scanrow{display:flex; gap:8px;}
  .scanrow .forminput{flex:1;}
  .scanbtn{width:44px; flex-shrink:0; border-radius:10px; background:var(--ink); display:flex; align-items:center; justify-content:center; cursor:pointer;}

  .checklist-item{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line); font-size:13px;}
  .cbx{width:19px; height:19px; border-radius:6px; border:1.5px solid var(--steel-light); flex-shrink:0;}
  .cbx.on{background:var(--teal); border-color:var(--teal); display:flex; align-items:center; justify-content:center;}

  .empty-msg{text-align:center; padding:40px 20px; color:var(--steel);}
  .empty-msg .big{font-family:var(--disp); font-size:15px; color:var(--ink); margin-bottom:4px;}

  .modal-overlay{position:absolute; inset:0; background:rgba(20,23,26,.5); z-index:60; display:flex; align-items:flex-end; justify-content:center;}
  .frame.tablet .modal-overlay{align-items:center;}
  .modal-sheet{background:var(--paper); width:100%; max-height:92%; border-radius:24px 24px 0 0; display:flex; flex-direction:column; overflow:hidden;}
  .frame.tablet .modal-sheet{width:560px; max-height:640px; border-radius:20px;}
  .modal-head{padding:16px 18px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--line); flex-shrink:0;}
  .modal-head h2{font-family:var(--disp); font-size:16px; flex:1;}
  .modal-body{flex:1; overflow-y:auto; padding:16px 18px 24px;}

  .photo-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:8px;}
  .photo-ph{aspect-ratio:1; border-radius:10px; background:#F1F2F4; display:flex; align-items:center; justify-content:center;}

  .toggle-2{display:flex; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:3px; margin:14px 0 4px;}
  .toggle-2 div{flex:1; text-align:center; padding:9px; border-radius:9px; font-size:12.5px; font-weight:700; color:var(--steel); cursor:pointer;}
  .toggle-2 div.active{background:var(--ink); color:var(--paper);}

  ::selection{background:var(--amber); color:#FFFFFF;}
</style>
</head>
<body>

</div>

<div class="stage"><div id="frame" class="frame mobile"><div class="notch"></div><div class="screen" id="screen"></div></div></div>

function dial(pct,color){
  const r=26,c=2*Math.PI*r,off=c-(pct/100)*c;
  return `<div class="dial"><svg width="64" height="64" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="${r}" stroke="#E5E7EB" stroke-width="6" fill="none"/>
    <circle cx="32" cy="32" r="${r}" stroke="${color}" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
    </svg><div class="pct">${pct}%</div></div>`;
}

    <div class="photo-grid">${Array(4).fill(0).map(()=>`<div class="photo-ph" style="border:1.5px dashed #D1D5DB;background:transparent">${svg('camera',18,'#9CA3AF')}</div>`).join('')}</div>
    <div class="section-title">Pre-Intake Checklist</div>
    <div class="checklist-item"><div class="cbx on">${svg('check',12,'#fff',3)}</div>Spare tyre &amp; jack present</div>
    <div class="checklist-item"><div class="cbx"></div>Customer belongings logged</div>`;
  } else {
    body=`
    <div class="field-row"><div class="k">Customer</div><div class="v">Rohit Malhotra</div></div>
    <div class="field-row"><div class="k">Vehicle</div><div class="v">DL 3C AB 4021</div></div>
    <div class="field-row"><div class="k">Complaint</div><div class="v" style="text-align:right;max-width:60%">AC not cooling, brake noise</div></div>
    <div class="field-row"><div class="k">Assigned</div><div class="v">Suresh (Bay 2)</div></div>
    <div style="background:var(--teal-bg);color:var(--teal);border-radius:12px;padding:12px;font-size:12.5px;font-weight:600;margin-top:14px;display:flex;gap:8px;align-items:center">${svg('check',15,'#16A34A',2.4)} Ready to open job card JC-2420</div>`;
  }
  return `
  <div class="modal-head"><div class="iconbtn" onclick="closeModal()">${svg('close',16)}</div><h2>New Job Card</h2></div>
  <div class="modal-body">
    <div class="step-track">${steps.map((_,i)=>`<div class="step-dot ${i+1<s?'done':i+1===s?'now':''}">${i+1<s?svg('check',11,'#fff',3):i+1}</div>${i<steps.length-1?`<div class="step-line ${i+1<s?'done':''}"></div>`:''}`).join('')}</div>
    <div style="display:flex;gap:14px;font-size:10.5px;font-weight:700;color:var(--steel);text-transform:uppercase;letter-spacing:.3px;margin-bottom:16px">${steps.map(t=>`<div style="flex:1;text-align:center">${t}</div>`).join('')}</div>
    ${body}
    <div class="btnrow" style="margin-top:20px">
      ${s>1?`<button class="primary-btn outline" onclick="intakeStep(${s-1})">Back</button>`:''}
      ${s<4?`<button class="primary-btn amber" onclick="intakeStep(${s+1})">Continue</button>`:`<button class="primary-btn amber" onclick="closeModal()">Open Job Card</button>`}
    </div>
  </div>`;
}
function simpleModal(title,text,cta){
  return `<div class="modal-head"><div class="iconbtn" onclick="closeModal()">${svg('close',16)}</div><h2>${title}</h2></div>
  <div class="modal-body"><div style="font-size:13px;color:var(--steel);line-height:1.6;margin-bottom:16px">${text}</div>
  <div class="formgroup"><label>Item Name</label><input class="forminput" placeholder="Search catalog…"></div>
  <div class="formgroup"><label>Quantity / Hours</label><input class="forminput" placeholder="1"></div>
  <div class="formgroup"><label>Rate (₹)</label><input class="forminput" placeholder="0.00"></div>
  <button class="primary-btn amber" onclick="closeModal()">${cta}</button></div>`;
}
function modalContent(){
  if(state.modal==='newjob') return newJobModal();
  if(state.modal==='addpart') return simpleModal('Add Part','Search the parts catalog or enter a custom line item for this job card.','Add to Job Card');
  if(state.modal==='addlabor') return simpleModal('Add Labor Line','Log the work performed and time spent so it flows straight into the estimate.','Add Labor');
  if(state.modal==='addnote') return `<div class="modal-head"><div class="iconbtn" onclick="closeModal()">${svg('close',16)}</div><h2>Add Note</h2></div><div class="modal-body"><textarea class="forminput" style="height:110px;resize:none" placeholder="What happened…"></textarea><button class="primary-btn amber" style="margin-top:14px" onclick="closeModal()">Save Note</button></div>`;
  if(state.modal==='sendest') return `<div class="modal-head"><div class="iconbtn" onclick="closeModal()">${svg('close',16)}</div><h2>Send Estimate</h2></div><div class="modal-body"><div class="checklist-item"><div class="cbx on">${svg('check',12,'#fff',3)}</div>WhatsApp</div><div class="checklist-item"><div class="cbx"></div>SMS</div><div class="checklist-item"><div class="cbx"></div>Email</div><button class="primary-btn amber" style="margin-top:14px" onclick="closeModal()">Send Now</button></div>`;
  if(state.modal==='convertinv') return `<div class="modal-head"><div class="iconbtn" onclick="closeModal()">${svg('close',16)}</div><h2>Convert to Invoice</h2></div><div class="modal-body"><div style="font-size:13px;color:var(--steel);margin-bottom:14px;line-height:1.6">This creates a final invoice from the approved estimate, with parts, labor and tax carried over.</div><div class="formgroup"><label>Payment Terms</label><input class="forminput" value="Due on pickup"></div><button class="primary-btn amber" onclick="closeModal()">Generate Invoice</button></div>`;
  return '';
}

/* ============================================================
   TOP-LEVEL SCREEN ASSEMBLY
   ============================================================ */
function mobileNav(){
  const items=[['home','home','Home'],['jobs','job','Jobs'],['customers','users','Customers'],['billing','bill','Billing']];
  return `<div class="bottomnav">${items.map(([k,icon,l])=>`<div class="navitem ${state.tab===k?'active':''}" onclick="setTab('${k}')">${svg(icon,21)}<span>${l}</span></div>`).join('')}</div>`;
}
function railNav(){
  const items=[['home','home','Home'],['jobs','job','Jobs'],['customers','users','Clients'],['billing','bill','Billing']];
  return `<div class="rail"><div class="railbrand">G</div>${items.map(([k,icon,l])=>`<div class="railitem ${state.tab===k?'active':''}" onclick="setTab('${k}')">${svg(icon,20)}<span>${l}</span></div>`).join('')}</div>`;
}

function renderMobile(){
  let inner='';
  if(state.tab==='home'){
    inner = `<div class="appbar"><h1>Good morning, Ravi</h1><div class="iconbtn">${svg('bell',17)}</div><div class="avatar">RA</div></div><div class="content">${renderHome()}</div>`;
  } else if(state.tab==='jobs' && !state.jobId){
    inner = `<div class="appbar"><h1>Job Cards</h1><div class="iconbtn">${svg('search',17)}</div></div><div class="content">${renderJobsList()}</div>`;
  } else if(state.tab==='jobs' && state.jobId){
    const j = jobs.find(x=>x.id===state.jobId);
    const d = jobDetailHTML(j);
    const tabs=[['overview','Overview'],['parts','Parts'],['labor','Labor'],['estimate','Estimate'],['notes','Notes']];
    inner = `${d.header}<div class="tabs">${tabs.map(([k,l])=>`<div class="tabbtn ${state.jobTab===k?'active':''}" onclick="setJobTab('${k}')">${l}</div>`).join('')}</div><div class="content" style="padding-top:14px">${jobTabContent(j,state.jobTab)}</div>`;
  } else if(state.tab==='customers' && !state.customerId){
    inner = `<div class="appbar"><h1>Customers</h1><div class="iconbtn">${svg('plus',17)}</div></div><div class="content">${renderCustomersList()}</div>`;
  } else if(state.tab==='customers' && state.customerId){
    const c = customers.find(x=>x.id===state.customerId);
    inner = `<div class="appbar"><div class="iconbtn" onclick="backToCustomers()">${svg('back',17)}</div><h1>Customer</h1></div><div class="content">${customerDetailHTML(c)}</div>`;
  } else if(state.tab==='billing' && !state.billingId){
    inner = `<div class="appbar"><h1>Billing</h1><div class="iconbtn">${svg('search',17)}</div></div><div class="content">${renderBilling()}</div>`;
  } else if(state.tab==='billing' && state.billingId){
    const isEst = state.billingTab==='estimates';
    const r=(isEst?estimates:invoices).find(x=>x.id===state.billingId);
    inner = billingDetailHTML(r,isEst);
  }
  const showFab = (state.tab==='home')||(state.tab==='jobs' && !state.jobId);
  return `${inner}${mobileNav()}${showFab?`<div class="fab" onclick="openModal('newjob')">${svg('plus',22,'#FFFFFF',2.4)}</div>`:''}${state.modal?`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-sheet">${modalContent()}</div></div>`:''}`;
}

function renderTabletJobs(){
  const list = jobs.filter(j=> state.jobFilter==='all' || j.status===state.jobFilter);
  const j = jobs.find(x=>x.id===state.jobId) || jobs[0];
  const filters=[['all','All'],['in-progress','Active'],['awaiting-parts','Parts'],['awaiting-approval','Approval'],['ready-pickup','Ready'],['completed','Done']];
  const d = jobDetailHTML(j);
  const tabs=[['overview','Overview'],['parts','Parts'],['labor','Labor'],['estimate','Estimate'],['notes','Notes']];
  return `
  <div class="pane-list">
    <div style="padding:0 16px 10px"><div class="searchbar"><input placeholder="Search job cards…">${svg('search',16,'#9CA3AF')}</div>
    <div class="chiprow">${filters.map(([k,l])=>`<div class="chip ${state.jobFilter===k?'active':''}" onclick="setJobFilter('${k}')">${l}</div>`).join('')}</div></div>
    <div style="padding:0 16px">${list.map(x=>`<div onclick="openJob('${x.id}')" style="${x.id===j.id?'outline:2px solid #4F46E5;border-radius:14px':''}">${ticketCard(x)}</div>`).join('')}</div>
  </div>
  <div class="pane-detail">
    ${d.header}
    <div class="tabs">${tabs.map(([k,l])=>`<div class="tabbtn ${state.jobTab===k?'active':''}" onclick="setJobTab('${k}')">${l}</div>`).join('')}</div>
    <div class="content" style="padding-top:14px;max-width:640px">${jobTabContent(j,state.jobTab)}</div>
  </div>`;
}
function renderTabletCustomers(){
  const c = customers.find(x=>x.id===state.customerId) || customers[0];
  return `
  <div class="pane-list"><div style="padding:0 16px"><div class="searchbar"><input placeholder="Search customers…">${svg('search',16,'#9CA3AF')}</div></div>
    <div style="padding:0 16px">${customers.map(x=>`<div class="customer-row" style="${x.id===c.id?'background:#ECEBFC;border-radius:10px;padding-left:8px;padding-right:8px':''}" onclick="openCustomer('${x.id}')"><div class="ci">${initials(x.name)}</div><div><div class="cn">${x.name}</div><div class="cm">${x.vehicles.length} vehicle(s)</div></div>${svg('chevR',16,'#9CA3AF')}</div>`).join('')}</div>
  </div>
  <div class="pane-detail"><div class="content" style="padding-top:20px;max-width:600px">${customerDetailHTML(c)}</div></div>`;
}
function renderTabletBilling(){
  const isEst = state.billingTab==='estimates';
  const rows = isEst?estimates:invoices;
  const r = rows.find(x=>x.id===state.billingId) || rows[0];
  return `
  <div class="pane-list">
    <div style="padding:0 16px 8px"><div class="toggle-2" style="margin-top:0"><div class="${isEst?'active':''}" onclick="setBillingTab('estimates')">Estimates</div><div class="${!isEst?'active':''}" onclick="setBillingTab('invoices')">Invoices</div></div></div>
    <div style="padding:0 16px">${rows.map(x=>`<div onclick="openBillingItem('${x.id}')" style="${x.id===r.id?'outline:2px solid #4F46E5;border-radius:14px':''}" class="ticket"><div class="ticket-top"><div><div class="ticket-id">${x.id}</div><div class="ticket-plate" style="font-size:13px">${x.customer}</div><div class="ticket-veh">${x.vehicle}</div></div><div style="text-align:right"><div style="font-family:var(--mono);font-weight:700">${x.amount}</div><span class="status-pill ${x.status}" style="margin-top:6px">${x.status}</span></div></div></div>`).join('')}</div>
  </div>
  <div class="pane-detail">${billingDetailHTML(r,isEst)}</div>`;
}
function renderTabletHome(){
  return `<div class="content" style="padding-top:18px;max-width:900px">
    <div class="appbar" style="padding-left:0"><h1 style="font-size:24px">Good morning, Ravi</h1><div class="iconbtn">${svg('bell',17)}</div><div class="avatar">RA</div></div>
    ${renderHome()}
  </div>`;
}
function renderTablet(){
  let main='';
  if(state.tab==='home') main = renderTabletHome();
  else if(state.tab==='jobs'){ main = `<div class="split">${renderTabletJobs()}</div>`; }
  else if(state.tab==='customers'){ main = `<div class="split">${renderTabletCustomers()}</div>`; }
  else if(state.tab==='billing'){ main = `<div class="split">${renderTabletBilling()}</div>`; }
  return `${railNav()}<div class="tabletmain">${main}</div>${state.modal?`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-sheet">${modalContent()}</div></div>`:''}`;
}

function render(){
  document.getElementById('screen').innerHTML = state.device==='mobile' ? `<div class="statusbar"><span>9:41</span><span>●●●● 5G 🔋92%</span></div>${renderMobile()}` : renderTablet();
}

/* ============================================================
   ACTIONS
   ============================================================ */
function setTab(t){state.tab=t; state.jobId=null; state.customerId=null; state.billingId=null; render();}
function openJob(id){state.jobId=id; state.jobTab='overview'; state.tab='jobs'; render();}
function backToJobs(){state.jobId=null; render();}
function setJobTab(t){state.jobTab=t; render();}
function setJobFilter(f){state.jobFilter=f; render();}
function openCustomer(id){state.customerId=id; render();}
function backToCustomers(){state.customerId=null; render();}
function setBillingTab(t){state.billingTab=t; state.billingId=null; render();}
function openBillingItem(id){state.billingId=id; render();}
function backToBilling(){state.billingId=null; render();}
function openModal(m){state.modal=m; state.intakeStep=1; render();}
function closeModal(){state.modal=null; render();}
function intakeStep(n){state.intakeStep=n; render();}

document.getElementById('btn-mobile').onclick=()=>{state.device='mobile'; document.getElementById('btn-mobile').classList.add('active'); document.getElementById('btn-tablet').classList.remove('active'); document.getElementById('frame').className='frame mobile'; document.getElementById('frame').innerHTML='<div class="notch"></div><div class="screen" id="screen"></div>'; render();};
document.getElementById('btn-tablet').onclick=()=>{state.device='tablet'; document.getElementById('btn-tablet').classList.add('active'); document.getElementById('btn-mobile').classList.remove('active'); document.getElementById('frame').className='frame tablet'; document.getElementById('frame').innerHTML='<div class="screen" id="screen"></div>'; render();};

render();
</script>
</body>
</html>
